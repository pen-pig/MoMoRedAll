name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Debug SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          ls "${ANDROID_HOME}/platforms/" 2>/dev/null || echo "no platforms"
          ls "${ANDROID_HOME}/build-tools/" 2>/dev/null || echo "no build-tools"
          ls "${ANDROID_HOME}/cmdline-tools/" 2>/dev/null || echo "no cmdline-tools"

      - name: Setup SDK
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Generate project
        run: |
          mkdir -p app/src/main/java/com/marvis/momoreball

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF

          cat > settings.gradle.kts << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositories { google(); mavenCentral() } }
          rootProject.name = "MomoRedAll"
          include(":app")
          EOF

          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.marvis.momoreball"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.marvis.momoreball"
                  minSdk = 29
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              buildTypes { release { isMinifyEnabled = false } }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:allowBackup="false">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cp MomoRedAll.kt app/src/main/java/com/marvis/momoreball/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Check setup
        run: |
          gradle --version
          cat local.properties
          ls -la

      - name: Build
        run: gradle assembleRelease --no-daemon --stacktrace 2>&1

      - name: Release
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          [ -z "$APK" ] && echo "NO APK" && exit 1
          echo "APK: $APK ($(stat -c%s "$APK") bytes)"
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest "$APK" --title "MomoRedAll" --notes "Auto build" --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

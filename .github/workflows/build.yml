name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify & Setup Android SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          ls "${ANDROID_HOME}/platforms/" 2>/dev/null || echo "no platforms dir"
          ls "${ANDROID_HOME}/build-tools/" 2>/dev/null || echo "no build-tools dir"
          # Ensure platform 34 + build-tools 34 are installed
          if [ ! -d "${ANDROID_HOME}/platforms/android-34" ]; then
            echo "Installing platforms;android-34..."
            yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_HOME}" "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Generate project
        run: |
          mkdir -p app/src/main/java/com/marvis/momoreball
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p app/libs

          echo "sdk.dir=${ANDROID_HOME}" > local.properties

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF

          cat > settings.gradle.kts << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositories { google(); mavenCentral() } }
          rootProject.name = "MomoRedAll"
          include(":app")
          EOF

          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.marvis.momoreball"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.marvis.momoreball"
                  minSdk = 29
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              buildTypes { release { isMinifyEnabled = false } }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies { compileOnly(files("libs/api-82.jar")) }
          EOF

          # Download XposedBridge API jar
          curl -sL --retry 3 -o app/libs/api-82.jar \
            https://github.com/HNIdesu/XposedBridge/releases/download/latest/XposedBridgeApi-82.jar
          ls -la app/libs/api-82.jar

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:allowBackup="false">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="MomoRedAll v2.0" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <meta-data android:name="xposedscope" android:resource="@array/xposed_scope" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/arrays.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string-array name="xposed_scope">
                  <item>io.github.vvb2060.mahoshojo</item>
                  <item>io.github.vvb2060.keyattestation</item>
                  <item>duckduckgo.mobile.android</item>
              </string-array>
          </resources>
          EOF

          cp MomoRedAll.kt app/src/main/java/com/marvis/momoreball/
          echo "com.marvis.momoreball.MomoRedAll" > app/src/main/assets/xposed_init

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Build
        run: gradle assembleRelease --no-daemon --stacktrace 2>&1

      - name: Sign APK
        if: success()
        run: |
          UNSIGNED=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then echo "NO UNSIGNED APK — build may have failed"; exit 1; fi
          echo "Unsigned APK: $UNSIGNED ($(stat -c%s "$UNSIGNED") bytes)"
          keytool -genkey -v -keystore app/keystore.jks -alias momo -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=MomoRedAll, OU=Dev, O=Momo, L=Unknown, ST=Unknown, C=CN" \
            -storepass android -keypass android -noprompt
          APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort | tail -1)
          if [ -z "$APKSIGNER" ]; then
            # fallback: install any build-tools
            yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_HOME}" "build-tools;34.0.0"
            APKSIGNER=$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort | tail -1)
          fi
          echo "apksigner: $APKSIGNER"
          "$APKSIGNER" sign \
            --ks app/keystore.jks --ks-key-alias momo --ks-pass pass:android --key-pass pass:android \
            --out app/build/outputs/apk/release/app-release-signed.apk "$UNSIGNED"

      - name: Release
        if: success()
        run: |
          APK=app/build/outputs/apk/release/app-release-signed.apk
          if [ ! -f "$APK" ]; then echo "NO SIGNED APK"; exit 1; fi
          echo "APK: $APK ($(stat -c%s "$APK") bytes)"
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest "$APK" --title "MomoRedAll v2.0" --notes "Auto build $(date '+%Y-%m-%d %H:%M')" --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

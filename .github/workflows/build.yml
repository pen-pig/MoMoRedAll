name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install SDK components
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Generate project
        run: |
          mkdir -p app/src/main/java/com/marvis/momoreball
          mkdir -p app/src/main/res/values

          cat > app/build.gradle.kts << 'EOF'
          plugins { id("com.android.application"); kotlin("android") }
          android {
              namespace = "com.marvis.momoreball"
              compileSdk = 35
              defaultConfig { applicationId = "com.marvis.momoreball"; minSdk = 29; targetSdk = 35; versionCode = 1; versionName = "1.0" }
              buildTypes { release { isMinifyEnabled = false } }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies { compileOnly("de.robv.android.xposed:api:82") }
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins { id("com.android.application") version "8.7.3" apply false; kotlin("android") version "2.1.0" apply false }
          EOF

          cat > settings.gradle.kts << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositories { google(); mavenCentral() } }
          rootProject.name = "MomoRedAll"; include(":app")
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:allowBackup="false" android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="MomoRedAll" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <meta-data android:name="xposedscope" android:resource="@array/xposed_scope" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/arrays.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string-array name="xposed_scope">
                  <item>io.github.vvb2060.mahoshojo</item>
                  <item>io.github.vvb2060.keyattestation</item>
                  <item>duckduckgo.mobile.android</item>
              </string-array>
          </resources>
          EOF

          cp MomoRedAll.kt app/src/main/java/com/marvis/momoreball/

      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          unzip -q gradle-8.11.1-bin.zip
          echo "$PWD/gradle-8.11.1/bin" >> $GITHUB_PATH

      - name: Build
        run: gradle assembleRelease --no-daemon --stacktrace 2>&1

      - name: Release
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          [ -z "$APK" ] && echo "NO APK" && exit 1
          echo "APK: $APK ($(stat -c%s "$APK") bytes)"
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest "$APK" --title "MomoRedAll" --notes "Auto build" --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

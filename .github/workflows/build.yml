name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p ${{ runner.tool_cache }}/android-sdk/cmdline-tools
          cd ${{ runner.tool_cache }}/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo commandlinetools-linux-11076708_latest.zip
          yes | cmdline-tools/bin/sdkmanager --sdk_root="$PWD" "platforms;android-35" "build-tools;35.0.0" "platform-tools" 2>&1 | tail -5
          echo "ANDROID_HOME=$PWD" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$PWD" >> $GITHUB_ENV

      - name: Generate project files
        run: |
          mkdir -p app/src/main/java/com/marvis/momoreball
          mkdir -p app/src/main/res/values

          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              kotlin("android")
          }
          android {
              namespace = "com.marvis.momoreball"
              compileSdk = 35
              defaultConfig {
                  applicationId = "com.marvis.momoreball"
                  minSdk = 29
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }
              buildTypes {
                  release { isMinifyEnabled = false }
              }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              compileOnly("de.robv.android.xposed:api:82")
          }
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.7.3" apply false
              kotlin("android") version "2.1.0" apply false
          }
          EOF

          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "MomoRedAll"
          include(":app")
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:allowBackup="false" android:supportsRtl="true">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription" android:value="让 Momo 全部检测报红" />
                  <meta-data android:name="xposedminversion" android:value="82" />
                  <meta-data android:name="xposedscope" android:resource="@array/xposed_scope" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/arrays.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string-array name="xposed_scope">
                  <item>io.github.vvb2060.mahoshojo</item>
                  <item>io.github.vvb2060.keyattestation</item>
                  <item>duckduckgo.mobile.android</item>
              </string-array>
          </resources>
          EOF

          cp MomoRedAll.kt app/src/main/java/com/marvis/momoreball/

      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          unzip -q gradle-8.11.1-bin.zip
          echo "$PWD/gradle-8.11.1/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          gradle assembleRelease --no-daemon --stacktrace 2>&1

      - name: Create Release
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          echo "APK found: $APK"
          if [ -z "$APK" ]; then
            echo "ERROR: No APK built!" && exit 1
          fi
          ls -la "$APK"
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest "$APK" \
            --title "MomoRedAll Latest Build" \
            --notes "Auto-built from master." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
